# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#
general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 500
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 6, linear
    animation = fadeOut, 1, 6, linear
    animation = inputFieldDots, 1, 2, linear
}

# Gruvbox dark palette (rgba)
# background: 282828, fg: ebdbb2, muteds: 928374, accent: d65d0e / b16286 / 689d6a
background {
    monitor =
    # Prefer a pre-scaled image matching your monitor resolution (see notes below)
    path = $HOME/Pictures/wallpaper/grapes-dimmed.png
    blur_passes = 3
    color = rgba(40, 40, 40, 0.60)    # fallback overlay if image not found
}

# Input field (password) — centered
input-field {
    monitor =
    outline_thickness = 2
    dots_size = 0.38        # relative to input-field height (0.2..0.8)
    dots_spacing = 0.28
    dots_center = true
    outer_color = rgba(0,0,0,0)      # transparent ring
    inner_color = rgba(0,0,0,0)      # no fill
    font_color = rgba(235, 219, 178, 0.95)   # ebdbb2
    fade_on_empty = true
    rounding = 10
    check_color = rgba(104, 157, 106, 0.95)  # green on success
    placeholder_text =
    hide_input = false
    # Keep it centered; small upward offset so time is above it
    position = 0, 0
    halign = center
    valign = center
    zindex = 3
}

# Big time label (smaller than your 600)
label {
  monitor =
  text = cmd[update:2000] echo "<span weight='700'>$(date +'%H:%M')</span>"
  color = rgba(235, 219, 178, 1)   # ebdbb2
  font_size = 145                   # sane for 1080p; increase for 4k
  font_family = "MesloLGM Nerd Font"
  position = 0, 365
  halign = center
  valign = center
}

# Optional smaller date below time
label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B %Y"
  color = rgba(168, 153, 132, 0.85)  # 928374 (muted)
  font_size = 20
  font_family = "MesloLGM Nerd Font"
  position = 0, 260
  halign = center
  valign = center
}

# Optional status text near bottom (fail text / hints)
label {
  monitor =
  text = cmd[update:2000] echo "<small><i>Press ESC to clear</i></small>"
  color = rgba(168, 153, 132, 0.85)
  font_size = 14
  font_family = "MesloLGM Nerd Font"
  position = 0, -45
  halign = center
  valign = center
}

